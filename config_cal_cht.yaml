# ============================
# DATA INPUTS
# ============================
data:
  images_glob_dir: "./calib_images"        # REQUIRED.
                                            # Folder containing the calibration images (raw camera captures).

  glob: "*.png"                             # REQUIRED.
                                            # Pattern to select images inside images_glob_dir.
                                            # Example: "*.jpg", "left_*.png", "frame_??.bmp".


# ============================
# CALIBRATION TARGET SPECIFICATION
# ============================
board:
  pattern: "chessboard"                     # REQUIRED.
                                            # Type of calibration target:
                                            #  - "chessboard": classical checkerboard of squares.
                                            #  - "circles": symmetric/asymmetric circle grid.
                                            #  - "charuco": ArUco + chessboard hybrid (better robustness).

  rows: 9                                   # REQUIRED.
                                            # Number of inner corners vertically.
                                            # Example: a board with 10 × 14 squares has 9 × 13 inner corners.

  cols: 13                                  # REQUIRED.
                                            # Number of inner corners horizontally.

  square_size: 0.025                         # REQUIRED.
                                            # Physical size of each square in meters.
                                            # Used to compute extrinsic translation vectors (poses).

  marker_size: 0.018                         # OPTIONAL.
                                            # Only for ChArUco boards: physical size of ArUco markers (meters).
                                            # Not used for chessboard or circle grid.


# ============================
# CHARUCO-SPECIFIC PARAMETERS
# ============================
charuco:
  dictionary: "DICT_5X5_1000"               # OPTIONAL.
                                            # Only used if pattern == "charuco".
                                            # Defines which ArUco dictionary to detect markers from.
                                            # Example choices:
                                            #   DICT_4X4_50, DICT_5X5_100, DICT_ARUCO_ORIGINAL, etc.


# ============================
# DETECTION REFINEMENT
# ============================
detector:
  refine_subpix: true                        # OPTIONAL.
                                            # If true, refine detected corners to subpixel accuracy.
                                            # Recommended for best calibration accuracy.


# ============================
# OPTIMIZATION SETTINGS
# ============================
solver:
  max_iter: 200                              # OPTIONAL.
                                            # Maximum iterations for optimization (termination criteria).
                                            # Higher = slower, but may converge better.

  eps: 1.0e-8                                # OPTIONAL.
                                            # Precision threshold for termination.
                                            # Lower value means stricter convergence.


# ============================
# FISHEYE CALIBRATION SETTINGS
# (Only used when fisheye.enable == true)
# ============================
fisheye:
  enable: false                              # OPTIONAL.
                                            # If true, use the fisheye distortion model:
                                            #   (k1, k2, k3, k4) only, no tangential distortion.

  recompute_extrinsic: true                  # OPTIONAL.
                                            # Forces recalculation of extrinsics on each iteration.
                                            # Helps convergence on distorted fisheye images.

  fix_skew: false                            # OPTIONAL.
                                            # Fisheye skew parameter is fixed at zero.

  fix_k1k2k3k4: false                        # OPTIONAL.
                                            # Freeze all fisheye distortion terms (useful if known beforehand).


# ============================
# PINHOLE MODEL FLAGS
# These control which parameters OpenCV keeps free or fixed.
# Only used when fisheye.enable == false.
# ============================
flags:
  use_intrinsic_guess: false                 # OPTIONAL.
                                            # If true, initial cameraMatrix/distCoeffs must be provided.
                                            # Otherwise they start from default/estimated values.

  fix_principal_point: false                 # OPTIONAL.
                                            # Locks (cx, cy) and prevents solver from adjusting image center.

  fix_aspect_ratio: false                    # OPTIONAL.
                                            # Keeps fx/fy ratio constant.
                                            # Requires initial fx/fy already set.

  zero_tangent_dist: false                   # OPTIONAL.
                                            # Forces tangential distortion parameters (p1, p2) to zero.

  rational_model: true                        # OPTIONAL (recommended).
                                            # Enables higher-order radial distortion terms: k4, k5, k6.

  thin_prism_model: false                    # OPTIONAL.
                                            # Enables thin-prism distortion coefficients: s1, s2, s3, s4.

  tilted_model: false                        # OPTIONAL.
                                            # Enables tilted sensor distortion terms: tauX, tauY.

  fix_k1: false                               # OPTIONAL.
  fix_k2: false                               # OPTIONAL.
  fix_k3: false                               # OPTIONAL.
                                            # Radial distortion parameters — freeze individually if desired.

  fix_k4: false                               # OPTIONAL.
  fix_k5: false                               # OPTIONAL.
  fix_k6: false                               # OPTIONAL.
                                            # Higher-order distortion parameters (if rational_model==true).

  fix_s1_s2_s3_s4: false                      # OPTIONAL.
                                            # Freeze thin-prism parameters.

  fix_taux_tauy: false                        # OPTIONAL.
                                            # Freeze tilted-sensor parameters.

  fix_focal_length: false                     # OPTIONAL.
                                            # Locks fx, fy.

  fix_skew: false                             # OPTIONAL.
                                            # Skew parameter α is fixed at initial value.


# ============================
# OUTPUT CONTROL
# ============================
output:
  dir: "./calib_out"                         # REQUIRED.
                                            # Folder to save calibration results, images, YAML/JSON.

  json: "calibration.json"                   # REQUIRED.
                                            # Main output file containing calibration parameters.

  yaml: "calibration.yaml"                   # OPTIONAL.
                                            # OpenCV-readable YAML output.
                                            # Useful for ROS, stereo calibration, C++ code loading.

  save_undistorted_preview: true             # OPTIONAL.
                                            # Saves undistorted versions of a few images.
                                            # Lets you visually check calibration success.


# How to Run:
# python cv2_cal_cht.py --config config_cal_cht.yaml
