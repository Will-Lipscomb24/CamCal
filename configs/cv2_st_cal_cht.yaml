# ============================
# CALIBRATION MODE
# ============================
mode: "opencv"                            # REQUIRED.
                                          # Which path to run:
                                          #  - "opencv" : use OpenCV's calibrateCamera / fisheye.calibrate
                                          #  - "scipy"  : use custom Levenberg–Marquardt (SciPy) solver

# ============================
# DATA SOURCES (mode-dependent)
# ============================
data:
  images_glob_dir: "./calib_images"       # REQUIRED for mode=="opencv", OPTIONAL otherwise.
                                          # Folder containing calibration images.

  glob: "*.png"                           # REQUIRED for mode=="opencv", OPTIONAL otherwise.
                                          # Filename glob (e.g., "*.jpg", "set1_*.png").

  points_npz: "./points.npz"              # REQUIRED for mode=="scipy", OPTIONAL otherwise.
                                          # Path to NPZ with:
                                          #   - ref_dirs : Nx3 unit vectors (either already CAM-frame or REF-frame)
                                          #   - pix_uv   : Nx2 observed pixel centroids

# ============================
# CALIBRATION TARGET (OpenCV mode)
# ============================
board:
  pattern: "chessboard"                   # REQUIRED for mode=="opencv". Ignored in "scipy".
                                          # Target type: "chessboard" | "circles" | "charuco".

  rows: 9                                 # REQUIRED for mode=="opencv".
                                          # Inner corners vertically.

  cols: 13                                # REQUIRED for mode=="opencv".
                                          # Inner corners horizontally.

  square_size: 0.025                      # REQUIRED for mode=="opencv".
                                          # Physical edge length of one square (meters). Sets pose scale.

  marker_size: 0.018                      # OPTIONAL. Only used if pattern=="charuco".
                                          # Physical size of the ArUco marker within each square (meters).

# ============================
# CHARUCO (OpenCV mode, if pattern=="charuco")
# ============================
charuco:
  dictionary: "DICT_5X5_1000"             # REQUIRED only if pattern=="charuco", otherwise OPTIONAL/ignored.
                                          # OpenCV's predefined dictionary name.

# ============================
# DETECTOR / CORNER REFINEMENT (OpenCV mode)
# ============================
detector:
  refine_subpix: true                     # OPTIONAL. Improves corner precision; recommended.

# ============================
# OPTIMIZATION CRITERIA (OpenCV mode)
# ============================
solver:
  max_iter: 200                           # OPTIONAL. Termination iterations for OpenCV solve.
  eps: 1.0e-8                             # OPTIONAL. Convergence epsilon.

# ============================
# FISHEYE MODEL (OpenCV mode)
# ============================
fisheye:
  enable: false                           # OPTIONAL. If true, runs cv2.fisheye.calibrate instead of pinhole.
  recompute_extrinsic: true               # OPTIONAL (fisheye-only). Recompute extrinsics each iter.
  fix_skew: false                         # OPTIONAL (fisheye-only). Constrain skew to zero.
  fix_k1k2k3k4: false                     # OPTIONAL (fisheye-only). Freeze all fisheye distortion terms.

# ============================
# OPENCV PINHOLE FLAGS (OpenCV mode; ignored if fisheye.enable==true)
# ============================
flags:
  use_intrinsic_guess: false              # OPTIONAL. If true, caller must provide initial K/D (not via this YAML).
  fix_principal_point: false              # OPTIONAL. Hold (cx, cy) fixed.
  fix_aspect_ratio: false                 # OPTIONAL. Keep fx/fy ratio constant (needs a good initial ratio).
  zero_tangent_dist: false                # OPTIONAL. Force p1=p2=0.
  rational_model: true                    # OPTIONAL (recommended). Enable k4–k6.
  thin_prism_model: false                 # OPTIONAL. Enable s1–s4.
  tilted_model: false                     # OPTIONAL. Enable tauX, tauY.
  fix_k1: false                           # OPTIONAL. Hold k1.
  fix_k2: false                           # OPTIONAL. Hold k2.
  fix_k3: false                           # OPTIONAL. Hold k3.
  fix_k4: false                           # OPTIONAL. Hold k4 (if rational_model).
  fix_k5: false                           # OPTIONAL. Hold k5 (if rational_model).
  fix_k6: false                           # OPTIONAL. Hold k6 (if rational_model).
  fix_s1_s2_s3_s4: false                  # OPTIONAL. Hold prism terms (if thin_prism_model).
  fix_taux_tauy: false                    # OPTIONAL. Hold tilted-sensor terms (if tilted_model).
  fix_focal_length: false                 # OPTIONAL. Hold fx, fy.
  fix_skew: false                         # OPTIONAL. Hold skew alpha.

# ============================
# CUSTOM SCIPY-LM CALIBRATION (mode=="scipy")
# ============================
scipy_calib:
  # ---- Initialization (used as starting guess and/or fixed values) ----
  init:
    dx: 2000.0                            # REQUIRED for "scipy".
                                          # Focal length in pixel-width units (fx analogue).

    dy: 2000.0                            # REQUIRED for "scipy".
                                          # Focal length in pixel-height units (fy analogue).

    alpha: 0.0                            # REQUIRED for "scipy".
                                          # Skew (usually 0).

    up: 960.0                             # REQUIRED for "scipy".
                                          # Principal point u (cx).

    vp: 540.0                             # REQUIRED for "scipy".
                                          # Principal point v (cy).

    k1: 0.0                               # REQUIRED for "scipy".
                                          # Radial distortion 1 (Brown–Conrady).

    k2: 0.0                               # REQUIRED for "scipy".
                                          # Radial distortion 2.

    k3: 0.0                               # REQUIRED for "scipy".
                                          # Radial distortion 3.

    p1: 0.0                               # REQUIRED for "scipy".
                                          # Tangential distortion 1.

    p2: 0.0                               # REQUIRED for "scipy".
                                          # Tangential distortion 2.

    q: [1.0, 0.0, 0.0, 0.0]               # OPTIONAL.
                                          # Quaternion [w,x,y,z] for CAM<-REF rotation if ref_dirs are in REF frame.
                                          # If your ref_dirs are already in CAM, you can omit or keep identity.

  # ---- Which parameters to optimize vs hold fixed ----
  optimize:
    solve_attitude: false                 # OPTIONAL. true -> include quaternion in solve (if q present).
                                          # Use when ref_dirs are given in a different frame than CAM.

    free_params:                          # OPTIONAL. List of parameter names to be optimized by LM.
      # If omitted, defaults to "optimize everything not in fixed_values or zero_params".
      # Valid names: dx, dy, alpha, up, vp, k1, k2, k3, p1, p2, qw, qx, qy, qz
      - dx
      - dy
      - up
      - vp
      - k1
      - k2
      - k3
      - p1
      - p2
      # - alpha
      # - qw
      # - qx
      # - qy
      # - qz

    fixed_values:                         # OPTIONAL. Dict of name: value to hold constant during optimization.
      # Use this to set any param to a specific constant (not only zero).
      # Example: {alpha: 0.0, up: 960.0, vp: 540.0}
      alpha: 0.0

    zero_params: []                       # OPTIONAL. List of parameter names to force to 0 and hold fixed.
                                          # Shortcut for fixed_values with value 0.0.
                                          # Example: ["p1","p2"]

    bounds: {}                            # OPTIONAL. Dict of name: [lower, upper] (applied to TRF/DOGBOX only).
                                          # LM ignores bounds; if you specify bounds you may want method: "trf".
                                          # Example: {dx: [1000, 5000], dy: [1000, 5000]}

  # ---- Solver controls ----
  solver:
    method: "lm"                          # OPTIONAL. "lm" | "trf" | "dogbox"
                                          # LM is standard for reprojection problems (no bounds).
    max_iter: 200                         # OPTIONAL. Iteration cap for SciPy least_squares.
    eps: 1.0e-12                          # OPTIONAL. Cost convergence tolerance (passed to least_squares via ftol/xtol).
    undist_iterations: 5                  # OPTIONAL. Fixed-point undistortion iterations in reverse mapping.

# ============================
# OUTPUT (both modes)
# ============================
output:
  dir: "./calib_out"                      # REQUIRED. Folder for results.
  json: "calibration.json"                # REQUIRED. Main results in JSON (K, D, RMS, flags/mode).
  yaml: "calibration.yaml"                # OPTIONAL. OpenCV YAML (for opencv mode) or mirror for convenience.
  save_undistorted_preview: true          # OPTIONAL (opencv mode). Saves a few undistorted demo images.
